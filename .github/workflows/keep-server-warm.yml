name: Keep server warm

on:
  schedule:
    # every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server health endpoint
        run: |
          echo "Pinging server health..."
          curl -fsS --max-time 10 https://hiring-tool-c21u.onrender.com/health || (echo 'Health check failed' && exit 1)